version: "3.9"

services:
  # ── PostgreSQL — local (HP Folio 9470m) ────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: medilink_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: medilink
      POSTGRES_USER: medilink
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medilink"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: medilink_api
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://medilink:${DB_PASSWORD:-changeme}@db:5432/medilink
      IS_CLOUD_NODE: "false"
      FACILITY_ID: "main"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --workers 2 --reload

  # ── React frontend ──────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: medilink_web
    restart: unless-stopped
    environment:
      REACT_APP_BACKEND_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:

# ── Usage notes ────────────────────────────────────────────────────────────────
# Local (HP Folio 9470m):
#   docker compose up -d
#   curl -X POST http://localhost:8000/api/seed
#
# iPad Kiosk: open http://<laptop-ip>:3000/kiosk in Safari
#
# Patient app: open http://<laptop-ip>:3000 and login with patient credentials
#
# Cloud node: deploy backend with IS_CLOUD_NODE=true and your cloud DB URL
